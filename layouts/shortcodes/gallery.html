{{ $title := .Get "title" }}

<div class="gallery-wrapper">
    <!-- Centered Header Section -->
    {{ with $title }}
        <div class="gallery-header">
            <h3>{{ . }}</h3>
            <div class="gallery-header-divider"></div>
        </div>
    {{ end }}

    <!-- Flexible Flex Grid -->
    <div class="gallery-grid">
        {{ .Inner }}
    </div>
</div>
