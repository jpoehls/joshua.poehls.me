<div class="verse-col hebrew-col">
    <header class="col-meta-header" role="button" tabindex="0" aria-label="Toggle Focus Mode" onclick="toggleColumnFocus(this)" onkeydown="if(event.key==='Enter'||event.key===' '){toggleColumnFocus(this); event.preventDefault();}">
        {{- with .Get "label" -}}<span class="col-meta-label">{{ . }}</span>{{- end -}}
        <div class="col-zoom-status-icon">
            <svg class="zoom-icon-expand" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            <svg class="zoom-icon-collapse" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/></svg>
        </div>
    </header>
    
    <div class="verse-content-body">{{ .Inner | markdownify }}</div>
    {{- with .Get "cite" -}}<span class="col-meta-cite">{{ . }}</span>{{- end -}}
</div>
