<meta charset="utf-8">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ with .Title }}{{ . }} | {{ $.Site.Title }}{{ else }}{{ $.Site.Title }}{{ end }}{{ end }}</title>

<link rel="canonical" href="{{ .Permalink }}">
<link href="{{ "feed.xml" | relURL }}" rel="alternate" type="application/atom+xml" title="{{ .Site.Title }}">
{{ hugo.Generator }}

<!-- Modern Hugo Asset Engine Integration -->
{{ $normalize := resources.Get "normalize.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $normalize.RelPermalink }}" integrity="{{ $normalize.Data.Integrity }}">

{{ $stylesOptions := dict "enableSourceMap" true }}
{{ $styles := resources.Get "styles.css" | css.Build $stylesOptions | minify | fingerprint }}
<link rel="stylesheet" href="{{ $styles.RelPermalink }}" integrity="{{ $styles.Data.Integrity }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif+Hebrew:wght@100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="apple-touch-icon" href="{{ "touch-icon-iphone.png" | relURL }}" />
<link rel="apple-touch-icon" sizes="76x76" href="{{ "touch-icon-ipad.png" | relURL }}" />
<link rel="apple-touch-icon" sizes="120x120" href="{{ "touch-icon-iphone-retina.png" | relURL }}" />
<link rel="apple-touch-icon" sizes="152x152" href="{{ "touch-icon-ipad-retina.png" | relURL }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ "touch-icon-iphone-retinahd.png" | relURL }}">
