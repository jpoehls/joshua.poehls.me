<ul class="taxonomy-content">
	{{ range .Data.Pages }}
	<li>
		<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Monday, 2 January 2006" }}</time>
		<span aria-hidden="true"> - </span>
		<a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
		{{ if .Params.linkurl }}
		<a href="{{ .Params.linkurl }}" class="subtle symbol" aria-label="Linked resource">&#10230;</a>
		{{ end }}
	</li>
	{{ end }}
</ul>
