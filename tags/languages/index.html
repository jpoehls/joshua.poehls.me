<script>
function toggleColumnFocus(headerElement) {
    
    const activeColumn = headerElement.closest('.verse-col');
    const container = activeColumn.closest('.parallel-verse-container');
    const isCurrentlyFocused = activeColumn.classList.contains('focused-column');
    
    if (isCurrentlyFocused) {
        activeColumn.classList.remove('focused-column');
        container.classList.remove('has-focused-column');
    } else {
        container.querySelectorAll('.verse-col').forEach(col => col.classList.remove('focused-column'));
        activeColumn.classList.add('focused-column');
        container.classList.add('has-focused-column');
    }
}
</script>
