baseURL = "https://joshua.poehls.me/"
languageCode = "en-us"
title = "joshua poehls | God is good"

footnoteAnchorPrefix = "fn"
footnoteReturnLinkContents = "↩"

disableKinds = ["404"]

[outputs]
	home = ["HTML", "RSS", "HUMANS"]
	# Only home emits feed.xml; section/taxonomy/term RSS would duplicate it
	section = ["HTML"]
	taxonomy = ["HTML"]
	term = ["HTML"]

[pagination]
pagerSize = 10
	# Not "page" — that collides with content/page/ (section index at /page/ vs pagers at /page/2/)
path = "p"

[mediaTypes]
	[mediaTypes.'application/atom+xml']
		suffixes = ["xml", "atom"]

[outputFormats]
[outputFormats.RSS]
	mediatype = "application/atom+xml"
	baseName = "feed"

[outputFormats.HUMANS]
	mediaType = "text/plain"
	baseName = "humans"
	isPlainText = true

[permalinks]
	post = "/:year/:slug"

[params]
author = "Joshua Poehls"
tagline = "God is good"

[taxonomies]
	tag = "tags"
	series = "series"

[markup.goldmark.renderer]
	unsafe = true

# Syntax highlighting (Chroma). style = theme name; try: github, emacs, friendly,
# pygments, tango, xcode, vs, … List: hugo gen chromastyles --help
[markup.highlight]
	codeFences = true
	noClasses = true
	style = "github"

[security]
	allowContent = ['.*']