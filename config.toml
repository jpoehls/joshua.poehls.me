baseURL = "https://joshua.poehls.me/"
languageCode = "en-us"
title = "joshua poehls | silent thoughts"
copyright = "Copyright (c) 2014-2018 Joshua Poehls. All rights reserved."

footnoteAnchorPrefix = "fn"
footnoteReturnLinkContents = "↩"

disableKinds = ["404"]

[pagination]
pagerSize = 10
path = "page"

[outputFormats]
[outputFormats.RSS]
	mediatype = "application/rss"
	baseName = "feed"

[permalinks]
	post = "/:year/:slug"

[params]
author = "Joshua Poehls"

[taxonomies]
	tag = "tags"
	series = "series"

[markup.goldmark.renderer]
	unsafe = true

# Syntax highlighting (Chroma). style = theme name; try: github, emacs, friendly,
# pygments, tango, xcode, vs, … List: hugo gen chromastyles --help
[markup.highlight]
	codeFences = true
	noClasses = true
	style = "github"
