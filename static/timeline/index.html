<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Figures Geovisualizer</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <div id="unified-panel" class="sidebar-panel">
            
            <div class="panel-toggle-handle" onclick="togglePanel()" title="Toggle View Deck">
                <span id="toggle-arrow">◀</span>
                <span class="toggle-label">View</span>
            </div>
            
            <div class="tabs-header">
                <button class="tab-link active" onclick="switchTab(event, 'people-tab')">
                    People <span id="people-count" class="tab-badge">0</span>
                </button>
                <button class="tab-link" id="timeline-nav-btn" onclick="switchTab(event, 'timeline-tab')">
                    Timeline <span id="timeline-count" class="tab-badge">0</span>
                </button>
            </div>
            
            <div class="panel-body-container">
                <div id="people-tab" class="tab-content active">
                    <div class="filter-container">
                        
                        <div class="filter-summary-bar" onclick="toggleFilterDrawer(event)">
                            <div class="filter-toggle-title">
                                <span id="drawer-caret">▶</span> 🔍 Filters
                            </div>
                            <div class="sort-inline-group" onclick="event.stopPropagation()">
                                <span class="sort-inline-label">Sort:</span>
                                <button id="sort-name-btn" class="sort-mini-btn active" onclick="changeSorting('name')" title="Sort Alphabetically">🔤</button>
                                <button id="sort-year-btn" class="sort-mini-btn" onclick="changeSorting('year')" title="Sort Chronologically">📅</button>
                            </div>
                        </div>

                        <div id="filter-drawer" class="filter-collapsible-drawer">
                            <div class="search-row">
                                <input type="text" id="search-input" placeholder="Search names...">
                            </div>
                            <div class="dropdown-row">
                                <select id="century-filter">
                                    <option value="all">All Centuries</option>
                                </select>
                                <select id="tag-filter">
                                    <option value="all">All Tags</option>
                                </select>
                            </div>
                            <div class="bulk-actions">
                                <button onclick="bulkSelect(true)">Select All</button>
                                <button onclick="bulkSelect(false)">Clear All</button>
                                <button class="reset-btn" onclick="resetFilters()">Reset</button>
                            </div>
                        </div>
                    </div>
                    <ul id="people-list" class="scroll-content"></ul>
                </div>

                <div id="timeline-tab" class="tab-content">
                    <div id="event-list" class="scroll-content"></div>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
